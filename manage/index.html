<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Porter's Nails & Spa — Porter, TX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --rose:#FBEAF0; --rose-mid:#F4C0D1; --rose-deep:#ED93B1; --rose-dark:#B84A6E; --rose-text:#72243E;
    --lavender:#EEEDFE; --lavender-mid:#CECBF6; --lavender-dark:#534AB7; --lavender-text:#3C3489;
    --cream:#FDF8F5; --peach:#FAECE7; --peach-mid:#F5C4B3; --peach-text:#712B13;
    --text:#3a2a2a; --text-soft:#6b4f4f; --text-muted:#9c8585; --white:#fff;
    --shadow:0 10px 40px rgba(184,74,110,0.08); --shadow-sm:0 4px 16px rgba(184,74,110,0.06);
    --good:#2e7d52; --good-bg:#E1F5EE;
  }
  html { scroll-behavior:smooth; }
  body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--text); line-height:1.75; overflow-x:hidden; font-size:16px; }
  .wrap { max-width:1180px; margin:0 auto; padding:0 2rem; }

  nav { position:sticky; top:0; z-index:100; background:rgba(253,248,245,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--rose-mid); }
  .nav-inner { display:flex; justify-content:space-between; align-items:center; padding:1.1rem 2rem; max-width:1180px; margin:0 auto; }
  .logo { display:flex; align-items:center; text-decoration:none; }
  .logo img { height:52px; width:auto; display:block; }
  .nav-links { display:flex; align-items:center; gap:2rem; list-style:none; }
  .nav-links a { text-decoration:none; color:var(--text-soft); font-size:15px; font-weight:600; transition:color .2s; }
  .nav-links a:hover { color:var(--rose-text); }
  .nav-cta { background:var(--rose-dark); color:var(--white)!important; padding:.6rem 1.4rem; border-radius:25px; white-space:nowrap; transition:transform .2s,box-shadow .2s; }
  .nav-cta:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(184,74,110,.3); }
  .nav-owner { display:inline-flex; align-items:center; gap:6px; color:var(--lavender-dark)!important; font-size:13px; white-space:nowrap; }
  .nav-toggle { display:none; background:none; border:none; cursor:pointer; padding:8px; color:var(--rose-text); }
  .nav-toggle svg { display:block; }

  .hero { position:relative; padding:5.5rem 0 5rem; overflow:hidden; }
  /* Confirmation modal */
  .confirm-wrap{ position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem; }
  .confirm-box{ background:#fff;border-radius:20px;padding:1.75rem 1.5rem;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center; }
  .confirm-box h3{ font-family:'Playfair Display',serif;font-size:18px;color:var(--rose-text);margin:0 0 .5rem; }
  .confirm-box p{ font-size:14px;color:var(--text-soft);margin:0 0 1.25rem;line-height:1.5; }
  .confirm-btns{ display:flex;gap:.5rem;justify-content:center; }
  .confirm-btns .btn-ghost{ flex:1;padding:.65rem;border:1.5px solid var(--rose-mid);border-radius:12px;background:none;font-size:14px;cursor:pointer;color:var(--text-soft); }
  .confirm-btns .btn-danger{ flex:1;padding:.65rem;border:none;border-radius:12px;background:#B84A6E;color:#fff;font-size:14px;font-weight:700;cursor:pointer; }
  .bv-wrap{ position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:center;justify-content:center;padding:1rem; }
  .bv-card{ background:var(--white);border-radius:24px;padding:2rem;max-width:420px;width:100%;box-shadow:var(--shadow-lg,0 20px 60px rgba(0,0,0,.18)); }
  .bv-head{ display:flex;align-items:center;gap:12px;margin-bottom:1rem; }
  .bv-head h2{ font-family:'Playfair Display',serif;font-size:20px;color:var(--rose-text);margin:0; }
  .bv-status{ display:inline-block;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:1rem;background:var(--rose);color:var(--rose-dark); }
  .bv-details{ background:var(--cream);border-radius:14px;padding:1rem;margin-bottom:1rem; }
  .bv-details div{ display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--rose-mid);font-size:14px; }
  .bv-details div:last-child{ border-bottom:none; }
  .bv-details span{ color:var(--text-soft); }
  .bv-actions{ display:flex;flex-direction:column;gap:.5rem; }
  .hero::before { content:''; position:absolute; top:-120px; right:-120px; width:480px; height:480px; background:var(--rose); border-radius:50%; }
  .hero::after { content:''; position:absolute; bottom:-160px; left:-100px; width:380px; height:380px; background:var(--lavender); border-radius:50%; }
  .hero-grid { position:relative; z-index:1; display:grid; grid-template-columns:1.1fr .9fr; gap:3.5rem; align-items:center; }
  .hero-badge { display:inline-flex; align-items:center; gap:7px; background:var(--lavender); color:var(--lavender-text); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:6px 16px; border-radius:25px; margin-bottom:1.5rem; }
  .hero h1 { font-family:'Playfair Display',serif; font-size:56px; font-weight:600; line-height:1.08; color:var(--rose-text); margin-bottom:1.25rem; }
  .hero h1 em { font-style:italic; color:var(--rose-dark); }
  .hero p { font-size:18px; color:var(--text-soft); max-width:440px; margin-bottom:2rem; }
  .hero-btns { display:flex; gap:14px; flex-wrap:wrap; }
  .btn { font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; padding:.95rem 2rem; border-radius:30px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px; border:none; transition:transform .2s,box-shadow .2s,background .2s; }
  .btn-primary { background:var(--rose-dark); color:var(--white); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(184,74,110,.3); }
  .btn-ghost { background:var(--white); color:var(--rose-text); border:2px solid var(--rose-mid); }
  .btn-ghost:hover { background:var(--rose); border-color:var(--rose-deep); }
  .hero-visual { position:relative; aspect-ratio:4/5; background:linear-gradient(160deg,var(--rose),var(--peach)); border-radius:28px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; }
  .hero-visual .ph { text-align:center; color:var(--rose-dark); }
  .hero-visual .ph i { font-size:56px; opacity:.5; }
  .hero-visual .ph p { font-size:13px; font-weight:600; margin-top:8px; letter-spacing:.05em; }

  section { padding:4.5rem 0; }
  .sec-head { text-align:center; margin-bottom:3rem; }
  .sec-eyebrow { font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--rose-dark); margin-bottom:.5rem; }
  .sec-head h2 { font-family:'Playfair Display',serif; font-size:40px; font-weight:500; color:var(--rose-text); }
  .sec-head p { color:var(--text-soft); margin-top:.5rem; font-size:17px; }

  .services { background:var(--white); }
  .services-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; }
  .svc-card { background:var(--cream); border:1px solid var(--rose-mid); border-radius:20px; padding:1.75rem; transition:transform .25s,box-shadow .25s,border-color .25s; }
  .svc-card:hover { transform:translateY(-6px); box-shadow:var(--shadow); border-color:var(--rose-deep); }
  .svc-icon { width:52px; height:52px; border-radius:14px; background:var(--rose); display:flex; align-items:center; justify-content:center; margin-bottom:1rem; }
  .svc-icon i { font-size:26px; color:var(--rose-dark); }
  .svc-card:nth-child(3n+2) .svc-icon { background:var(--lavender); } .svc-card:nth-child(3n+2) .svc-icon i { color:var(--lavender-dark); }
  .svc-card:nth-child(3n) .svc-icon { background:var(--peach); } .svc-card:nth-child(3n) .svc-icon i { color:var(--peach-text); }
  .svc-card h3 { font-size:19px; font-weight:700; color:var(--rose-text); margin-bottom:.4rem; }
  .svc-card p { font-size:14px; color:var(--text-soft); margin-bottom:1rem; min-height:42px; }
  .svc-price { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:var(--rose-dark); }
  .svc-price small { font-size:13px; font-weight:400; color:var(--text-muted); font-family:'Nunito'; }
  .svc-empty { grid-column:1/-1; text-align:center; color:var(--text-muted); padding:2rem; }

  .gallery-grid { display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:200px; gap:1rem; }
  .gal { background:linear-gradient(150deg,var(--lavender),var(--rose)); border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--lavender-dark); gap:6px; }
  .gal i { font-size:30px; opacity:.55; } .gal span { font-size:12px; font-weight:600; }
  .gal.big { grid-column:span 2; grid-row:span 2; }
  .gal:nth-child(even) { background:linear-gradient(150deg,var(--peach),var(--rose)); color:var(--peach-text); }

  .about { background:var(--white); }
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:3.5rem; align-items:center; }
  .about-text h2 { font-family:'Playfair Display',serif; font-size:38px; font-weight:500; color:var(--rose-text); line-height:1.15; margin-bottom:1.25rem; }
  .about-text p { color:var(--text-soft); margin-bottom:1rem; font-size:16px; }
  .info-stack { display:flex; flex-direction:column; gap:1rem; }
  .info-card { display:flex; align-items:center; gap:1rem; background:var(--cream); border:1px solid var(--rose-mid); border-radius:16px; padding:1.1rem 1.4rem; }
  .info-card .ic-ico { width:46px; height:46px; flex-shrink:0; border-radius:12px; background:var(--lavender); display:flex; align-items:center; justify-content:center; }
  .info-card .ic-ico i { font-size:22px; color:var(--lavender-dark); }
  .info-card:nth-child(2) .ic-ico { background:var(--rose); } .info-card:nth-child(2) .ic-ico i { color:var(--rose-dark); }
  .info-card:nth-child(3) .ic-ico { background:var(--peach); } .info-card:nth-child(3) .ic-ico i { color:var(--peach-text); }
  .info-card strong { display:block; font-size:15px; color:var(--rose-text); font-weight:700; }
  .info-card span { font-size:13px; color:var(--text-soft); }

  .booking { background:linear-gradient(170deg,var(--rose) 0%,var(--cream) 100%); }
  .wiz { max-width:760px; margin:0 auto; background:var(--white); border-radius:24px; box-shadow:var(--shadow); padding:2.25rem 2.5rem 2.5rem; }
  .wiz-steps { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:2rem; flex-wrap:wrap; }
  .wiz-step { display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:12px; font-weight:700; }
  .wiz-step .num { width:26px; height:26px; border-radius:50%; background:var(--rose); color:var(--rose-text); display:flex; align-items:center; justify-content:center; font-size:12px; }
  .wiz-step.active .num { background:var(--rose-dark); color:var(--white); }
  .wiz-step.active { color:var(--rose-text); }
  .wiz-step.done .num { background:var(--good-bg); color:var(--good); }
  .wiz-line { width:28px; height:2px; background:var(--rose-mid); margin:0 8px; }
  .wiz-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:var(--rose-text); text-align:center; margin-bottom:.25rem; }
  .wiz-sub { text-align:center; color:var(--text-soft); font-size:14px; margin-bottom:1.75rem; }
  .choice-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.85rem; }
  .choice { border:1.5px solid var(--rose-mid); border-radius:14px; padding:1.1rem 1.25rem; cursor:pointer; background:var(--cream); transition:border-color .2s,background .2s; display:flex; justify-content:space-between; align-items:center; }
  .choice:hover { border-color:var(--rose-dark); background:var(--rose); }
  .choice.sel { border-color:var(--rose-dark); background:var(--rose); box-shadow:0 0 0 2px var(--rose-deep); }
  .choice .c-name { font-weight:700; color:var(--rose-text); font-size:15px; }
  .choice .c-meta { font-size:12px; color:var(--text-soft); margin-top:2px; }
  .choice .c-price { font-size:13px; font-weight:700; color:var(--rose-dark); }
  .tech-ava { font-size:11px; color:var(--lavender-dark); background:var(--lavender); padding:3px 9px; border-radius:12px; font-weight:700; }

  .cal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .cal-head .cal-mon { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--rose-text); }
  .cal-nav { background:var(--cream); border:1px solid var(--rose-mid); width:36px; height:36px; border-radius:50%; cursor:pointer; color:var(--rose-text); font-size:16px; display:flex; align-items:center; justify-content:center; }
  .cal-nav:hover { background:var(--rose); }
  .cal-nav:disabled { opacity:.35; cursor:not-allowed; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-dow { text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; padding:4px 0; }
  .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:10px; font-size:14px; font-weight:600; }
  .cal-day.open { background:var(--cream); border:1.5px solid var(--rose-mid); color:var(--rose-text); cursor:pointer; }
  .cal-day.open:hover { background:var(--rose); border-color:var(--rose-dark); }
  .cal-day.sel { background:var(--rose-dark); color:var(--white); border-color:var(--rose-dark); }
  .cal-day.blocked { color:var(--text-muted); text-decoration:line-through; background:transparent; opacity:.5; }
  .cal-day.empty { background:transparent; }
  .cal-legend { display:flex; gap:1.25rem; justify-content:center; margin-top:1rem; font-size:12px; color:var(--text-soft); }
  .cal-legend span { display:inline-flex; align-items:center; gap:6px; }
  .lg-dot { width:12px; height:12px; border-radius:4px; }

  .slot-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.6rem; }
  .slot { padding:.65rem; text-align:center; border:1.5px solid var(--rose-mid); border-radius:10px; background:var(--cream); cursor:pointer; font-weight:700; color:var(--rose-text); font-size:14px; }
  .slot:hover { background:var(--rose); border-color:var(--rose-dark); }
  .slot.sel { background:var(--rose-dark); color:var(--white); border-color:var(--rose-dark); }
  .slot.taken { opacity:.4; text-decoration:line-through; cursor:not-allowed; background:transparent; }

  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:1rem; }
  .field label { font-size:13px; font-weight:700; color:var(--rose-text); }
  .field input, .field textarea, .field select { font-family:'Nunito'; font-size:15px; padding:.75rem 1rem; border:1.5px solid var(--rose-mid); border-radius:12px; background:var(--cream); color:var(--text); outline:none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--rose-dark); }
  .field textarea { resize:none; height:70px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .summary { background:var(--lavender); border-radius:14px; padding:1.1rem 1.4rem; margin-bottom:1.25rem; }
  .summary div { display:flex; justify-content:space-between; font-size:14px; padding:3px 0; color:var(--lavender-text); }
  .summary strong { font-weight:700; }
  .wiz-actions { display:flex; justify-content:space-between; margin-top:1.5rem; }
  .wiz-back { background:transparent; border:none; color:var(--text-soft); font-weight:700; cursor:pointer; font-family:'Nunito'; font-size:14px; display:inline-flex; align-items:center; gap:6px; }
  .wiz-back:hover { color:var(--rose-text); }
  .wiz-checking { text-align:center; font-size:13px; color:var(--text-soft); padding:.5rem 0; }
  .wiz-done { text-align:center; padding:1rem 0; }
  .wiz-done .check { width:72px; height:72px; border-radius:50%; background:var(--good-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
  .wiz-done .check i { font-size:38px; color:var(--good); }
  .wiz-done h3 { font-family:'Playfair Display'; font-size:26px; color:var(--rose-text); margin-bottom:.5rem; }
  .wiz-done p { color:var(--text-soft); font-size:15px; max-width:440px; margin:0 auto 1rem; }
  .pending-note { background:var(--peach); color:var(--peach-text); border-radius:12px; padding:.85rem 1.1rem; font-size:13px; font-weight:600; max-width:460px; margin:0 auto; }
  .empty-techs { text-align:center; padding:2rem 1rem; color:var(--text-muted); }
  .empty-techs i { font-size:40px; opacity:.4; }

  footer { background:var(--rose-text); color:#f4d0df; padding:3rem 0 2rem; }
  .footer-grid { display:grid; grid-template-columns:2fr 1fr 1fr; gap:2rem; margin-bottom:2rem; }
  .footer-logo { font-family:'Playfair Display',serif; font-size:24px; color:var(--white); margin-bottom:.75rem; }
  footer p, footer a { font-size:14px; color:#f0c8d8; line-height:1.9; text-decoration:none; }
  footer a:hover { color:var(--white); }
  .footer-col h4 { color:var(--white); font-size:15px; margin-bottom:.75rem; font-weight:700; }
  .footer-col a { display:block; }
  .map-link { margin-bottom:.5rem; }
  .map-link i { font-size:13px; }
  .map-link:hover { text-decoration:underline; }

  .promo-bar { background:var(--rose-dark); color:#fff; text-align:center; padding:.6rem 1rem; font-size:14px; font-weight:700; letter-spacing:.01em; }
  .promo-bar i { margin-right:6px; }
  .open-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; letter-spacing:.04em; padding:6px 14px; border-radius:25px; margin-bottom:1.5rem; margin-left:8px; }
  .open-badge.open { background:var(--good-bg); color:var(--good); }
  .open-badge.closed { background:#f0e0e0; color:#9a5a5a; }
  .open-badge .dot { width:8px; height:8px; border-radius:50%; background:currentColor; }
  .gal-photo { background-size:cover; background-position:center; position:relative; }
  .gal-cap { position:absolute; left:0; right:0; bottom:0; background:linear-gradient(transparent,rgba(58,23,38,.65)); color:#fff; font-size:12px; font-weight:600; padding:1.2rem .8rem .6rem; }
  /* owner-facing helpers */
  .help { background:var(--lavender); color:var(--lavender-text); border-radius:12px; padding:.85rem 1.1rem; font-size:14px; margin-bottom:1.25rem; line-height:1.5; }
  .help b { font-weight:800; }
  .big-input { width:100%; font-family:'Nunito'; font-size:16px; padding:.85rem 1rem; border:1.5px solid var(--rose-mid); border-radius:12px; background:var(--cream); color:var(--text); outline:none; margin-bottom:.9rem; }
  .big-input:focus { border-color:var(--rose-dark); }
  .big-label { font-size:15px; font-weight:800; color:var(--rose-text); display:block; margin:0 0 .4rem; }
  .btn-big { width:100%; justify-content:center; font-size:16px; padding:1rem; }
  .gphoto-row { display:flex; gap:1rem; align-items:center; background:var(--cream); border:1px solid var(--rose-mid); border-radius:14px; padding:.75rem; margin-bottom:.75rem; }
  .gphoto-row img { width:64px; height:64px; object-fit:cover; border-radius:10px; flex-shrink:0; background:var(--rose); }
  .gphoto-row .gp-cap { flex:1; font-size:14px; color:var(--rose-text); font-weight:600; }
  .upload-zone { position:relative; border:2px dashed var(--rose-mid); border-radius:14px; padding:1.5rem 1rem; text-align:center; cursor:pointer; background:var(--rose); transition:border-color .2s; }
  .upload-zone:hover { border-color:var(--rose-dark); }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; background:var(--cream); border:1px solid var(--rose-mid); border-radius:14px; padding:1rem 1.25rem; margin-bottom:1rem; }
  .toggle-row .tr-label { font-size:15px; font-weight:800; color:var(--rose-text); }
  .switch { position:relative; width:56px; height:30px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .slider-sw { position:absolute; inset:0; background:var(--rose-mid); border-radius:30px; transition:.2s; cursor:pointer; }
  .slider-sw::before { content:''; position:absolute; height:24px; width:24px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider-sw { background:var(--good); }
  .switch input:checked + .slider-sw::before { transform:translateX(26px); }
  .hours-edit-row { display:grid; grid-template-columns:90px auto 1fr; gap:.6rem; align-items:center; margin-bottom:.6rem; }
  .hours-edit-row .hd-day { font-weight:800; color:var(--rose-text); font-size:14px; }
  .hours-edit-row select { font-family:'Nunito'; font-size:14px; padding:.5rem; border:1.5px solid var(--rose-mid); border-radius:10px; background:var(--white); }
  .hours-edit-row .hd-times { display:flex; gap:.4rem; align-items:center; }

  .faq { background:var(--white); }
  .faq-list { max-width:780px; margin:0 auto; }

  function techSlots(tech, dateStr){
    var p=dateStr.split('-'); var dow=new Date(p[0],p[1]-1,p[2]).getDay();
    if(!tech.days[dow]) return [];
    var out=[]; for(var h=tech.start; h<tech.end; h++) out.push(pad(h)+':00'); return out;
  }
  function bookedTimes(techId, dateStr){
    return appts.filter(function(a){ return a.techId===techId && a.date===dateStr && a.status!=='declined'; }).map(function(a){ return a.time; });
  }
  function dayState(tech, dateStr){
    if(dateStr < todayStr) return 'past';
    var slots = techSlots(tech, dateStr);
    if(slots.length===0) return 'off';
    var booked = bookedTimes(tech.id, dateStr);
    return slots.every(function(s){ return booked.indexOf(s)>-1; }) ? 'full' : 'open';
  }

    var el = document.getElementById('wizSteps');

    el.innerHTML = STEP_LABELS.map(function(lbl,i){
      var n=i+1; var cls = n<wiz.step?'done':(n===wiz.step?'active':'');
      var inner = '<div class="wiz-step '+cls+'"><div class="num">'+(n<wiz.step?'<i class="ti ti-check"></i>':n)+'</div><span class="txt">'+lbl+'</span></div>';
      return inner + (n<6?'<div class="wiz-line"></div>':'');
    }).join('');
  }

  function render(){

    if(wiz.step===2) return renderService(b);

    if(wiz.step===4) return renderDate(b);
    if(wiz.step===5) return renderTimeStep(b);
    if(wiz.step===6) return renderDetails(b);

      list = '<div class="empty-techs"><i class="ti ti-user-question"></i><p>No nail techs are set up for this service yet.<br>Please call us at (281) 747-7421.</p></div>';

    b.querySelector('.wiz-back').onclick=function(){ wiz.step=2; render(); };

  function renderDate(b){
    var isAny=wiz.techId==='any';
    var tech=isAny?null:techs.filter(function(t){return t.id===wiz.techId;})[0];
    var eligTechs=isAny?techs.filter(function(t){return t.cats.indexOf(wiz.cat)>-1;}):null;
    var y=calRef.getFullYear(), m=calRef.getMonth();
    var monthName = calRef.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    var firstDow = new Date(y,m,1).getDay();
    var daysIn = new Date(y,m+1,0).getDate();
    var thisMonth = new Date(); var atStart = (y===thisMonth.getFullYear() && m===thisMonth.getMonth());
    var cells='';
    for(var i=0;i<firstDow;i++) cells+='<div class="cal-day empty"></div>';
    for(var d=1; d<=daysIn; d++){
      var ds = y+'-'+pad(m+1)+'-'+pad(d);
      var st;
      if(isAny){
        if(ds<todayStr) st='past';
        else st=eligTechs.some(function(t){return techSlots(t,ds).length>0;})?'open':'off';
      } else {
        st=dayState(tech,ds);
      }
      if(st==='open') cells+='<div class="cal-day open '+(wiz.date===ds?'sel':'')+'" data-date="'+ds+'">'+d+'</div>';
      else cells+='<div class="cal-day blocked">'+d+'</div>';
    }
    var wiz_sub=isAny?'Dates when at least one tech is available':'Available days with '+tech.name+' are highlighted';
    b.innerHTML = '<div class="wiz-title">Pick a date</div><div class="wiz-sub">'+wiz_sub+'</div>'+
      '<div class="cal-head"><button class="cal-nav" id="calPrev" '+(atStart?'disabled':'')+'><i class="ti ti-chevron-left"></i></button><div class="cal-mon">'+monthName+'</div><button class="cal-nav" id="calNext"><i class="ti ti-chevron-right"></i></button></div>'+
      '<div class="cal-grid">'+DOW.map(function(d){ return '<div class="cal-dow">'+d+'</div>'; }).join('')+cells+'</div>'+
      '<div class="cal-legend"><span><span class="lg-dot" style="background:var(--rose);border:1.5px solid var(--rose-mid)"></span> Available</span><span><span class="lg-dot" style="background:#eadede"></span> Booked / closed</span></div>'+
      '<div class="wiz-actions"><button class="wiz-back"><i class="ti ti-arrow-left"></i> Back</button><span></span></div>';
    Array.prototype.forEach.call(b.querySelectorAll('[data-date]'),function(el){ el.onclick=function(){ wiz.date=el.dataset.date; wiz.time=null; wiz.step=5; render(); }; });
    b.querySelector('#calPrev').onclick=function(){ if(!atStart){ calRef.setMonth(calRef.getMonth()-1); render(); } };
    b.querySelector('#calNext').onclick=function(){ calRef.setMonth(calRef.getMonth()+1); render(); };
    b.querySelector('.wiz-back').onclick=function(){ wiz.step=3; render(); };
  }

  function renderTimeStep(b){
    var isAny=wiz.techId==='any';
    var tech=isAny?null:techs.filter(function(t){return t.id===wiz.techId;})[0];
    var slots=[], workingTechs=[], subtitle='';
    if(isAny){
      var eligTechs2=techs.filter(function(t){return t.cats.indexOf(wiz.cat)>-1;});
      var p2=wiz.date.split('-'),dow2=new Date(+p2[0],+p2[1]-1,+p2[2]).getDay();
      workingTechs=eligTechs2.filter(function(t){return t.days[dow2];});
      var slotMap={}; workingTechs.forEach(function(t){techSlots(t,wiz.date).forEach(function(s){slotMap[s]=true;});});
      slots=Object.keys(slotMap).sort();
      subtitle=fmtDateLong(wiz.date)+' &mdash; any available tech';
    } else {
      slots=techSlots(tech,wiz.date);
      subtitle=fmtDateLong(wiz.date)+' with '+tech.name;
    }
    b.innerHTML='<div class="wiz-title">Pick a time</div><div class="wiz-sub">'+subtitle+'</div>'+
      '<div class="slot-grid">'+slots.map(function(s){return '<div class="slot" style="opacity:.5">'+fmtTime(s)+'</div>';}).join('')+'</div>'+
      '<div class="wiz-checking"><i class="ti ti-loader"></i> Checking availability...</div>'+
      '<div class="wiz-actions"><button class="wiz-back"><i class="ti ti-arrow-left"></i> Back</button><span></span></div>';
    b.querySelector('.wiz-back').onclick=function(){wiz.step=4;render();};
    var doRender=function(takenSlots){
      var grid=b.querySelector('.slot-grid'); if(!grid) return;
      var chk=b.querySelector('.wiz-checking'); if(chk) chk.remove();
      grid.innerHTML=slots.map(function(s){
        var taken=takenSlots.indexOf(s)>-1;
        return '<div class="slot'+(taken?' taken':'')+(wiz.time===s?' sel':'')+'"'+(taken?'':' data-time="'+s+'"')+'>'+fmtTime(s)+(taken?'<div style="font-size:10px;font-weight:400;margin-top:2px">Booked</div>':'')+'</div>';
      }).join('');
      Array.prototype.forEach.call(b.querySelectorAll('[data-time]'),function(el){el.onclick=function(){wiz.time=el.dataset.time;wiz.step=6;render();};});
    };
    if(typeof BOOKING_API!=='undefined'&&BOOKING_API){
      var url=isAny?BOOKING_API+'/api/book?slots=1&tech=any&date='+wiz.date:BOOKING_API+'/api/book?slots=1&tech='+encodeURIComponent(tech.name)+'&date='+wiz.date;
      fetch(url).then(function(r){return r.json();}).then(function(d){
        if(isAny){
          var bbt=d.bookedByTech||{};
          var wt=workingTechs;
          var taken=slots.filter(function(s){
            var tw=wt.filter(function(t){return techSlots(t,wiz.date).indexOf(s)>-1;});
            return tw.length>0&&tw.every(function(t){return (bbt[t.name]||[]).indexOf(s)>-1;});
          });
          doRender(taken);
        } else {
          if(d.blocked&&d.blocked.indexOf('ALL_DAY')>-1){ doRender(slots); }
          else { doRender(d.booked||[]); }
        }
      }).catch(function(){doRender([]);});
    } else {doRender([]);}
  }

      var endpoint=isReschedule?(BOOKING_API+'/api/booking'):(BOOKING_API+'/api/book');
      var payload=isReschedule?
        {original_token:wiz.rescheduleToken,name:name,phone:phone,email:b.querySelector('#dEmail').value.trim(),notes:b.querySelector('#dNotes').value.trim(),service:wiz.service,category:catName(wiz.cat),techName:isAny?'Any available':tech.name,date:wiz.date,time:wiz.time,priceLabel:wiz.priceLabel||''}:
        {name:name,phone:phone,email:b.querySelector('#dEmail').value.trim(),notes:b.querySelector('#dNotes').value.trim(),service:wiz.service,category:catName(wiz.cat),techName:isAny?'Any available':tech.name,date:wiz.date,time:wiz.time,priceLabel:wiz.priceLabel||''};
      fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.success){ wiz.step=7; render(); }
        else{ btn.disabled=false; btn.innerHTML='<i class="ti ti-calendar-check"></i> Request appointment'; showToast('Something went wrong. Please call (281) 747-7421.'); }
      })
      .catch(function(){ btn.disabled=false; btn.innerHTML='<i class="ti ti-calendar-check"></i> Request appointment'; showToast('Could not connect. Please call (281) 747-7421.'); });
    };
    b.querySelector('.wiz-back').onclick=function(){ wiz.step=5; render(); };

  function renderApptsTab(){
    var tb=document.getElementById('tabBody');
    tb.innerHTML='<div class="dash-empty"><i class="ti ti-loader"></i><p>Loading appointments...</p></div>';
    fetch(BOOKING_API+'/api/appointments',{
      headers:{}
    })
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(rows){
      var pending=rows.filter(function(a){return a.status==='pending';}).length;
      var confirmed=rows.filter(function(a){return a.status==='confirmed';}).length;
      var html='<div class="dash-stats"><div class="stat"><div class="s-label">Total</div><div class="s-val">'+rows.length+'</div></div><div class="stat"><div class="s-label">Pending</div><div class="s-val">'+pending+'</div></div><div class="stat"><div class="s-label">Confirmed</div><div class="s-val">'+confirmed+'</div></div></div>';
      if(!rows.length){ html+='<div class="dash-empty"><i class="ti ti-calendar-off"></i><p>No appointments yet. Once customers book, they\'ll show up here.</p></div>'; tb.innerHTML=html; return; }
      html+=rows.map(function(a){
        var p=(a.date||'').split('-'); var dt=p.length===3?new Date(p[0],p[1]-1,p[2]):new Date();
        var actions=a.status==='pending'?
          '<div class="mini-btns"><button class="mini ok" data-ok="'+a.id+'"><i class="ti ti-check"></i> Approve</button><button class="mini no" data-no="'+a.id+'">Decline</button></div>':
          '<span class="badge '+a.status+'">'+a.status+'</span>';
        return '<div class="appt"><div class="a-date"><div class="ad-day">'+dt.getDate()+'</div><div class="ad-mon">'+dt.toLocaleDateString('en-US',{month:'short'})+'</div></div>'+
          '<div><div class="a-name">'+escHtml(a.name||'')+'</div>'+
          '<div class="a-meta"><i class="ti ti-phone" style="font-size:11px"></i> <a href="tel:'+escHtml(a.phone||'')+'">'+escHtml(a.phone||'')+'</a>'+(a.email?' &middot; '+escHtml(a.email):'')+'</div>'+
          '<div class="a-svc">'+escHtml(a.service||'')+(a.tech_name?' &middot; with '+escHtml(a.tech_name):'')+(a.time?' &middot; '+fmtTime(a.time):'')+(a.price?' &middot; '+escHtml(a.price):'')+(a.notes?' &middot; <em>'+escHtml(a.notes)+'</em>':'')+'</div></div>'+
          '<div class="a-right">'+actions+'</div></div>';
      }).join('');
      tb.innerHTML=html;
      Array.prototype.forEach.call(tb.querySelectorAll('[data-ok]'),function(el){
        el.onclick=function(){
          var row=rows.filter(function(r){return r.id===el.dataset.ok;})[0];
          el.disabled=true; el.textContent='Updating...';
          updateApptStatus(row.id,'confirmed',row.name,row.email,row.service,row.date,row.time);
        };
      });
      Array.prototype.forEach.call(tb.querySelectorAll('[data-no]'),function(el){
        el.onclick=function(){
          var row=rows.filter(function(r){return r.id===el.dataset.no;})[0];
          el.disabled=true; el.textContent='Updating...';
          updateApptStatus(row.id,'declined',row.name,row.email,row.service,row.date,row.time);
        };
      });
    })
    .catch(function(e){ console.error(e); tb.innerHTML='<div class="dash-empty"><i class="ti ti-alert-circle"></i><p>Could not load appointments. Check your connection.</p></div>'; });
  }

  function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function updateApptStatus(id,status,name,email,service,date,time){
    if(typeof BOOKING_API==='undefined'||!BOOKING_API){ showToast('Booking API not configured'); return; }
    fetch(BOOKING_API+'/api/update-status',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:id,status:status,name:name||'',email:email||'',service:service||'',date:date||'',time:time||''})
    })
    .then(function(r){return r.json();})
    .then(function(d){ if(d.success){ showToast('Appointment '+status+'!'); renderDash(); } else showToast('Could not update. Try again.'); })
    .catch(function(){ showToast('Connection error.'); });
  }

      '</div>'+
      '<div id="uploadPreview" style="display:none;margin:.75rem 0"><img id="previewImg" style="max-height:120px;border-radius:10px;object-fit:cover"><span id="previewName" style="font-size:12px;color:var(--text-soft);display:block;margin-top:.3rem"></span></div>'+
      '<label class="big-label">Caption (optional)</label>'+
      '<input class="big-input" id="newPhotoCap" placeholder="e.g. Spring floral set">'+
      '<button class="btn btn-primary btn-big" id="addPhoto" disabled><i class="ti ti-upload"></i> Upload photo</button>'+
      '<div id="uploadProgress" style="display:none;margin-top:.5rem;font-size:13px;color:var(--text-soft)"><i class="ti ti-loader"></i> Uploading...</div>'+
      '</div>';

    // File picker preview
    var fileInput=tb.querySelector('#photoFile');
    var selectedFile=null;
    fileInput.onchange=function(){
      if(!fileInput.files[0]) return;
      selectedFile=fileInput.files[0];
      var reader=new FileReader();
      reader.onload=function(e){
        tb.querySelector('#previewImg').src=e.target.result;
        tb.querySelector('#previewName').textContent=selectedFile.name+' ('+Math.round(selectedFile.size/1024)+'KB)';
        tb.querySelector('#uploadPreview').style.display='block';
        tb.querySelector('#addPhoto').disabled=false;
      };
      reader.readAsDataURL(selectedFile);
    };

    // Delete photo
    Array.prototype.forEach.call(tb.querySelectorAll('[data-delp]'),function(el){
      el.onclick=function(){
        showConfirm({title:'Remove photo?',message:'This photo will be removed from your gallery on the website.',confirmLabel:'Remove photo',onConfirm:function(){
          gallery=gallery.filter(function(p){return p.id!==el.dataset.delp;});
          save('porters_gallery',gallery); syncSetting('gallery',gallery); renderGalleryPublic(); renderDash();
        }});
      };
    });

    // Upload photo to Supabase Storage
    tb.querySelector('#addPhoto').onclick=function(){
      if(!selectedFile){ showToast('Please pick a photo first'); return; }
      var btn=tb.querySelector('#addPhoto');
      var prog=tb.querySelector('#uploadProgress');
      btn.disabled=true; prog.style.display='block';
      var ext=selectedFile.name.split('.').pop().toLowerCase();
      var fname='gallery/'+Date.now()+'.'+ext;
      var uploadUrl=BOOKING_API+'/api/upload';
      fetch(uploadUrl,{
        method:'POST',
        headers:{
          'x-file-name':fname,
          'Content-Type':selectedFile.type,
          'x-upsert':'true'
        },
        body:selectedFile
      })
      .then(function(r){ if(!r.ok) throw new Error('Upload failed '+r.status); return r.json(); })
      .then(function(){
        var publicUrl='https://cguokuwxonsletmtqfwr.supabase.co/storage/v1/object/public/'+fname;
        gallery.push({ id:'g'+Date.now(), url:publicUrl, caption:tb.querySelector('#newPhotoCap').value.trim() });
        save('porters_gallery',gallery); syncSetting('gallery',gallery); renderGalleryPublic(); showToast('Photo uploaded!'); renderDash();
      })
      .catch(function(e){ btn.disabled=false; prog.style.display='none'; showToast('Upload failed: '+e.message); });
    };
  }

  function renderMsgLogTab(){
    var tb=document.getElementById('tabBody');
    tb.innerHTML='<div class="dash-empty"><i class="ti ti-loader"></i><p>Loading...</p></div>';
    var filter='all';

    function load(){
      fetch(BOOKING_API+'/api/messages',{
        headers:{}
      })
      .then(function(r){return r.json();})
      .then(function(rows){
        if(!Array.isArray(rows)||rows.length===0){
          tb.innerHTML='<div class="help">Message history will appear here after the first booking is made.</div>';
          return;
        }
        var filtered = filter==='all' ? rows : rows.filter(function(r){ return r.type===filter; });
        var html='<div class="help">Showing the last '+rows.length+' messages sent by the system.</div>';
        html+='<div class="msglog-filters">'
          +'<button class="msglog-filter-btn'+(filter==='all'?' active':'')+'" data-f="all">All</button>'
          +'<button class="msglog-filter-btn'+(filter==='sms'?' active':'')+'" data-f="sms"><i class="ti ti-message"></i> SMS</button>'
          +'<button class="msglog-filter-btn'+(filter==='email'?' active':'')+'" data-f="email"><i class="ti ti-mail"></i> Email</button>'
          +'<button class="msglog-filter-btn" id="clearLogBtn" style="margin-left:auto;border-color:#e57373;color:#c62828"><i class="ti ti-trash"></i> Clear log</button>'
          +'</div>';
        if(filtered.length===0){
          html+='<div class="msglog-empty">No messages of this type yet.</div>';
        } else {
          html+='<div style="overflow-x:auto"><table class="msglog-table">'
            +'<thead><tr><th>Time</th><th>Type</th><th>Recipient</th><th>Trigger</th><th>Preview</th></tr></thead><tbody>';
          html+=filtered.map(function(m){
            var d=new Date(m.created_at);

var _apptView='upcoming', _apptWeek=0, _apptCache=null;

function _todayStr(){ return new Date().toISOString().slice(0,10); }
function _ym2(d){ return d.toISOString().slice(0,10); }
function _wkDates(off){ var d=new Date(),day=d.getDay(),mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7)+off*7); return [0,1,2,3,4,5].map(function(i){var x=new Date(mon);x.setDate(mon.getDate()+i);return x;}); }
function _mon(d){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]; }
function _dname(d){ return ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][((d.getDay()+6)%7)]; }
function _isToday(d){ return _ym2(d)===_todayStr(); }
function _safeDate(s){ var p=s?s.split('-'):[]; return p.length===3?new Date(+p[0],+p[1]-1,+p[2]):new Date(); }
function _isActive(a){ return a.status==='pending'||a.status==='confirmed'; }
function _isPast(a){ return !_isActive(a)||(a.status==='confirmed'&&a.date<_todayStr()); }
function _isAnyTech(a){ return !a.tech_name||a.tech_name==='Any available'||a.tech_name==='To be assigned'; }
function fmtTime(t){ if(!t) return ''; var p=t.split(':'); if(p.length<2) return t; var h=+p[0],m=p[1],ap=h>=12?'PM':'AM'; return (h%12||12)+':'+m+' '+ap; }

function _loadAppts(cb){
  if(_apptCache){cb(_apptCache);return;}
  fetch(BOOKING_API+'/api/book')
  .then(function(r){return r.json();})
  .then(function(d){_apptCache=d;cb(d);})
  .catch(function(){document.getElementById('tabBody').innerHTML='<div class="dash-empty"><i class="ti ti-alert-circle"></i><p>Could not load appointments. Check your connection.</p></div>';});
}

    return '<span class="badge confirmed">confirmed</span>'+rescheduleBtn+cancelBtn;
  }
  return '<span class="badge '+a.status+'">'+a.status+'</span>';

      '<button class="btn btn-primary btn-big" id="wiSubmit" style="flex:1"><i class="ti ti-check"></i> Add as confirmed</button>'+
    '</div>'+
  '</div>';
}

function _drawAppts(data){
  var tb=document.getElementById('tabBody'); if(!tb) return;
  var today=_todayStr();
  var upcoming=data.filter(function(a){ return _isActive(a)&&a.date>=today; });
  var pending=upcoming.filter(function(a){return a.status==='pending';}).length;
  var confirmed=upcoming.filter(function(a){return a.status==='confirmed';}).length;
  var wdates=_wkDates(_apptWeek), wkeys=wdates.map(_ym2);
  var wAppts=data.filter(function(a){ return wkeys.indexOf(a.date)>-1&&_isActive(a); });
  var techMap={}; data.forEach(function(a){if(a.tech_name&&!_isAnyTech(a))techMap[a.tech_name]=1;});
  if(typeof techs!=='undefined') techs.forEach(function(t){techMap[t.name]=1;});
  var techList=Object.keys(techMap).sort();
  var TC=[['#fdf0f4','#B84A6E'],['#e1f5ee','#0F6E56'],['#fdefd5','#8a5a00'],['#e6f1fb','#185FA5']];
  var wLabel=_mon(wdates[0])+' '+wdates[0].getDate()+' – '+_mon(wdates[5])+' '+wdates[5].getDate()+', '+wdates[0].getFullYear();
  var h='';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem"><h2 style="font-family:Playfair Display,serif;font-size:22px;color:var(--rose-text)">Appointments</h2><button class="btn btn-primary" id="addWalkinBtn" style="font-size:13px;padding:.5rem 1.2rem"><i class="ti ti-plus"></i> Walk-in / Add</button></div>';
  h+='<div class="sch-stats"><div class="sch-stat"><div class="ss-l">Upcoming</div><div class="ss-v">'+upcoming.length+'</div></div><div class="sch-stat"><div class="ss-l">Pending</div><div class="ss-v" style="color:#8a5a00">'+pending+'</div></div><div class="sch-stat"><div class="ss-l">Confirmed</div><div class="ss-v" style="color:#3B6D11">'+confirmed+'</div></div></div>';
  h+='<div id="walkinFormWrap"></div>';
  h+='<div class="sch-bar"><div class="sch-views"><button class="svb'+(_apptView==='week'?' svo':'')+'" data-v="week">Week</button><button class="svb'+(_apptView==='upcoming'?' svo':'')+'" data-v="upcoming">Upcoming</button><button class="svb'+(_apptView==='past'?' svo':'')+'" data-v="past">Past</button></div>';
  if(_apptView==='week') h+='<div class="sch-wnav"><button class="wnb" id="wprev">&#8592;</button><span class="wnl">'+wLabel+'</span><button class="wnb" id="wtoday">Today</button><button class="wnb" id="wnext">&#8594;</button></div>';
  h+='</div>';

  if(_apptView==='week'){
    var anyPending=wAppts.filter(function(a){return _isAnyTech(a)&&a.status==='pending';});
    if(anyPending.length){
      h+='<div class="any-alert"><i class="ti ti-user-question"></i> <strong>'+anyPending.length+' unassigned</strong> — tap Upcoming to assign a tech</div>';
    }
    if(!techList.length){ h+='<div class="dash-empty"><i class="ti ti-calendar-off"></i><p>No appointments yet.</p></div>'; }
    else{
      h+='<div class="sch-grid"><div class="sch-hrow"><div class="sch-tc"></div>';
      wdates.forEach(function(d){h+='<div class="sch-dh'+(_isToday(d)?' schtoday':'')+'"><div class="shdow">'+_dname(d)+'</div><div class="shdate">'+d.getDate()+'</div></div>';});
      h+='</div>';
      techList.forEach(function(tech,ti){
        var bg=TC[ti%4][0],tc=TC[ti%4][1];
        h+='<div class="sch-trow"><div class="sch-thead" data-ti="'+ti+'"><div class="sch-tc"><div class="tav" style="background:'+bg+';color:'+tc+'">'+tech.charAt(0)+'</div><span>'+escHtml(tech)+'</span></div>';
        wdates.forEach(function(d){
          var dk=_ym2(d);
          var da=wAppts.filter(function(a){return a.tech_name===tech&&a.date===dk;});
          h+='<div class="sch-dc">';
          if(!da.length){ h+='<div class="sch-em">—</div>'; }
          else{ da.forEach(function(a){ var ip=a.status==='pending'; h+='<div class="sch-chip'+(ip?' schp':'')+'" data-ti2="'+ti+'">'+(a.time?'<span class="chtime">'+fmtTime(a.time)+'</span>':'')+'<div class="chsvc">'+escHtml((a.service||'').split(' ').slice(0,3).join(' '))+'</div></div>'; }); }
          h+='</div>';
        });
        h+='</div>';
        h+='<div class="sch-td" id="std-'+ti+'">';
        var twa=wAppts.filter(function(a){return a.tech_name===tech;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
        if(!twa.length){ h+='<div style="padding:10px;font-size:13px;color:var(--text-soft)">No active appointments this week.</div>'; }
        else{ twa.forEach(function(a){ h+=_apptCard(a,ti); }); }
        h+='</div></div>';
      });
      h+='</div>';
    }
  } else if(_apptView==='upcoming'){
    var list=upcoming.sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
    if(!list.length){ h+='<div class="dash-empty"><i class="ti ti-calendar-off"></i><p>No upcoming appointments.</p></div>'; }
    else{ h+=_renderList(list); }
  } else {
    var pastList=data.filter(_isPast).sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time);});
    if(!pastList.length){ h+='<div class="dash-empty"><i class="ti ti-history"></i><p>No past appointments yet.</p></div>'; }
    else{ h+=_renderList(pastList); }
  }

  tb.innerHTML=h;
  _wireApptEvents(tb);
}

function _apptCard(a, ti){
  var rescheduleNote = a.reschedule_of ? '<div class="sdr-nt" style="color:#185FA5"><i class="ti ti-calendar-event" style="font-size:12px"></i> Reschedule request</div>' : '';
  return '<div class="sdr-dr" id="acard-'+a.id+'">'+
    '<span class="sdr-d">'+_dname(_safeDate(a.date))+'</span>'+
    '<span class="sdr-t">'+fmtTime(a.time||'09:00')+'</span>'+
    '<div class="sdr-s"><span class="sdr-svc">'+escHtml(a.service||'')+'</span>'+(a.price?'<span class="sdr-pr">'+escHtml(a.price)+'</span>':'')+'</div>'+
    '<div class="sdr-n">'+escHtml(a.name||'')+'<br><a href="tel:'+escHtml(a.phone||'')+'" style="font-size:11px;color:#B84A6E">'+escHtml(a.phone||'')+'</a></div>'+
    '<div class="sdr-ax" id="ax-'+a.id+'">'+_actionBtns(a)+'</div>'+
    (a.notes?'<div class="sdr-nt"><i class="ti ti-notes" style="font-size:12px"></i> '+escHtml(a.notes)+'</div>':'')+
    rescheduleNote+
  '</div>';
}

function _renderList(list){
  var h='<div class="sch-lv">';
  list.forEach(function(a){
    var rescheduleNote = a.reschedule_of ? ' <span style="font-size:11px;color:#185FA5;font-weight:700">↻ Reschedule request</span>' : '';
    h+='<div class="sch-lr"><div class="slrd"><div class="slrdn">'+_dname(_safeDate(a.date))+'</div><div class="slrmd">'+_mon(_safeDate(a.date))+' '+_safeDate(a.date).getDate()+'</div></div>'+
      '<div class="slrt">'+fmtTime(a.time||'09:00')+'</div>'+
      '<div class="slri"><div class="slrsvc">'+escHtml(a.service||'')+rescheduleNote+'</div><div class="slrtech">'+escHtml(a.tech_name||'')+'</div></div>'+
      '<div class="slrc">'+escHtml(a.name||'')+'<br><a href="tel:'+escHtml(a.phone||'')+'" style="font-size:12px;color:#B84A6E">'+escHtml(a.phone||'')+'</a></div>'+
      '<div class="slrax" id="ax-'+a.id+'">'+_actionBtns(a)+'</div></div>';
  });
  h+='</div>';
  return h;
}

function _wireApptEvents(tb){
  // View switcher
  Array.prototype.forEach.call(tb.querySelectorAll('.svb'),function(b){b.onclick=function(){_apptView=b.dataset.v;_drawAppts(_apptCache);};});
  var wp=tb.querySelector('#wprev'); if(wp)wp.onclick=function(){_apptWeek--;_drawAppts(_apptCache);};
  var wn=tb.querySelector('#wnext'); if(wn)wn.onclick=function(){_apptWeek++;_drawAppts(_apptCache);};
  var wt=tb.querySelector('#wtoday'); if(wt)wt.onclick=function(){_apptWeek=0;_drawAppts(_apptCache);};
  Array.prototype.forEach.call(tb.querySelectorAll('.sch-thead'),function(el){
    el.onclick=function(){var d=document.getElementById('std-'+el.dataset.ti);if(d)d.style.display=d.style.display==='none'?'block':'none';};
  });
  Array.prototype.forEach.call(tb.querySelectorAll('.sch-chip'),function(c){
    c.onclick=function(e){e.stopPropagation();var d=document.getElementById('std-'+c.dataset.ti2);if(d)d.style.display='block';};
  });

  // Walk-in / Add button
  var wib=tb.querySelector('#addWalkinBtn');
  if(wib) wib.onclick=function(){
    var wrap=tb.querySelector('#walkinFormWrap');
    if(wrap.innerHTML){ wrap.innerHTML=''; return; }
    wrap.innerHTML=_walkinForm();
    // Populate services when category changes
    var catSel=wrap.querySelector('#wiCat');
    var svcSel=wrap.querySelector('#wiSvc');
    function populateSvcs(){
      var cat=(typeof CATALOG!=='undefined'?CATALOG:[]).filter(function(c){return c.id===catSel.value;})[0];
      svcSel.innerHTML=cat?(cat.items||[]).map(function(i){var pLabel=i.price?" ($"+i.price+")":""; return "<option value=\""+escHtml(i.name)+pLabel+"\">"+escHtml(i.name)+(i.price?" — $"+i.price:"")+"</option>";}).join(""):"";
    }
    populateSvcs(); catSel.onchange=populateSvcs;
    wrap.querySelector('#wiCancel').onclick=function(){wrap.innerHTML='';};
    wrap.querySelector('#wiSubmit').onclick=function(){
      var name=wrap.querySelector('#wiName').value.trim();
      var phone=wrap.querySelector('#wiPhone').value.trim();
      var date=wrap.querySelector('#wiDate').value;
      var time=wrap.querySelector('#wiTime').value;
      var svcVal=wrap.querySelector('#wiSvc').value;
      var svcName=svcVal.split(' ($')[0];
      var techName=wrap.querySelector('#wiTech').value;
      var cat=(typeof CATALOG!=='undefined'?CATALOG:[]).filter(function(c){return c.id===catSel.value;})[0];
      var catName=cat?cat.cat:'';
      if(!name||!phone||!date||!time||!svcName){showToast('Please fill in all required fields');return;}
      var btn=wrap.querySelector('#wiSubmit'); btn.disabled=true; btn.innerHTML='Adding...';
      fetch(BOOKING_API+'/api/book',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:name,phone:phone,email:wrap.querySelector('#wiEmail').value.trim(),service:svcName,category:catName,techName:techName,date:date,time:time,notes:wrap.querySelector('#wiNotes').value.trim(),priceLabel:'',walkin:true})
      })
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.success){ showToast(name+' added and confirmed!'); _apptCache=null; wrap.innerHTML=''; renderApptsTab(); }
        else{ btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Add as confirmed'; showToast('Could not save. Try again.'); }
      })
      .catch(function(){ btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Add as confirmed'; showToast('Connection error.'); });
    };
  };

  // Plain approve
  Array.prototype.forEach.call(tb.querySelectorAll('[data-approve]'),function(el){
    el.onclick=function(){el.disabled=true;el.innerHTML='...';updateApptStatus(el.dataset.approve,'confirmed',el.dataset.aname,el.dataset.aemail,el.dataset.asvc,el.dataset.adate,el.dataset.atime,null);};
  });

  // Assign & Approve (any available)
  Array.prototype.forEach.call(tb.querySelectorAll('[data-assign]'),function(el){
    el.onclick=function(){
      var container=el.closest('.sdr-ax')||el.closest('.slrax'); if(!container) return;
      var opts=techs.map(function(t){return '<option value="'+escHtml(t.name)+'">'+escHtml(t.name)+'</option>';}).join('');
      container.innerHTML='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
        '<select class="tpsel" style="font-size:12px;padding:4px 8px;border:1px solid var(--rose-mid);border-radius:8px;font-family:Nunito"><option value="">Pick a tech...</option>'+opts+'</select>'+
        '<button class="mini ok" id="tpconfirm">Confirm</button>'+
        '<button class="mini" id="tpcancel" style="background:#f0e8e8;color:#9a5a5a">✕</button>'+
      '</div><div id="tpwarn" style="font-size:12px;color:#9a2a2a;margin-top:4px;display:none"></div>';
      container.querySelector('#tpcancel').onclick=function(){_drawAppts(_apptCache);};
      container.querySelector('#tpconfirm').onclick=function(){
        var sel=container.querySelector('.tpsel');
        if(!sel||!sel.value){showToast('Please pick a tech first');return;}
        var techName=sel.value;
        var btn=container.querySelector('#tpconfirm');
        var warn=container.querySelector('#tpwarn');
        btn.disabled=true; btn.innerHTML='Checking...';
        fetch(BOOKING_API+'/api/book?slots=1&tech='+encodeURIComponent(techName)+'&date='+el.dataset.adate+'&exclude='+el.dataset.assign)
        .then(function(r){return r.json();})
        .then(function(d){
          var booked=d.booked||[];
          if(booked.indexOf(el.dataset.atime)>-1){
            btn.disabled=false; btn.innerHTML='Confirm';
            warn.style.display='block';
            warn.innerHTML='⚠️ <strong>'+escHtml(techName)+'</strong> is already booked at '+fmtTime(el.dataset.atime)+'. Pick a different tech.';
          } else {
            btn.innerHTML='Confirming...';
            updateApptStatus(el.dataset.assign,'confirmed',el.dataset.aname,el.dataset.aemail,el.dataset.asvc,el.dataset.adate,el.dataset.atime,techName);
          }
        })
        .catch(function(){ btn.innerHTML='Confirming...'; updateApptStatus(el.dataset.assign,'confirmed',el.dataset.aname,el.dataset.aemail,el.dataset.asvc,el.dataset.adate,el.dataset.atime,techName); });
      };
    };
  });

  // Reschedule — inline date/time picker
  Array.prototype.forEach.call(tb.querySelectorAll('[data-reschedule]'),function(el){
    el.onclick=function(){
      var ax=document.getElementById('ax-'+el.dataset.reschedule); if(!ax) return;
      var today=_todayStr();
      ax.innerHTML='<div style="display:flex;flex-direction:column;gap:6px;min-width:220px">'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
          '<input type="date" id="rsDate-'+el.dataset.reschedule+'" value="'+escHtml(el.dataset.adate)+'" min="'+today+'" style="font-size:12px;padding:4px 8px;border:1px solid var(--rose-mid);border-radius:8px;flex:1">'+
          '<input type="time" id="rsTime-'+el.dataset.reschedule+'" value="'+escHtml(el.dataset.atime)+'" style="font-size:12px;padding:4px 8px;border:1px solid var(--rose-mid);border-radius:8px;flex:1">'+
        '</div>'+
        '<div style="display:flex;gap:6px">'+
          '<button class="mini" id="rsCancel-'+el.dataset.reschedule+'" style="background:#f0e8e8;color:#9a5a5a">✕ Cancel</button>'+
          '<button class="mini ok" id="rsConfirm-'+el.dataset.reschedule+'"><i class="ti ti-check"></i> Save & notify</button>'+
        '</div>'+
        '<div id="rsWarn-'+el.dataset.reschedule+'" style="font-size:12px;color:#9a2a2a;display:none"></div>'+
      '</div>';
      document.getElementById('rsCancel-'+el.dataset.reschedule).onclick=function(){_drawAppts(_apptCache);};
      document.getElementById('rsConfirm-'+el.dataset.reschedule).onclick=function(){
        var newDate=document.getElementById('rsDate-'+el.dataset.reschedule).value;
        var newTime=document.getElementById('rsTime-'+el.dataset.reschedule).value;
        var warn=document.getElementById('rsWarn-'+el.dataset.reschedule);
        if(!newDate||!newTime){showToast('Please pick a date and time');return;}
        showConfirm({title:'Reschedule appointment?',
          message:escHtml(el.dataset.aname)+'\'s '+escHtml(el.dataset.asvc)+' will be moved from '+escHtml(el.dataset.adate)+' at '+fmtTime(el.dataset.atime)+' to '+newDate+' at '+fmtTime(newTime)+'. They\'ll be notified by text and email.',
          confirmLabel:'Reschedule & notify',
          danger:false,
          onConfirm:function(){
            var btn=document.getElementById('rsConfirm-'+el.dataset.reschedule);
            if(btn){btn.disabled=true;btn.innerHTML='Saving...';}
            fetch(BOOKING_API+'/api/update-status',{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({id:el.dataset.reschedule,status:'rescheduled',name:el.dataset.aname,email:el.dataset.aemail,phone:el.dataset.aphone,service:el.dataset.asvc,date:newDate,time:newTime,tech_name:el.dataset.atech,new_date:newDate,new_time:newTime,old_date:el.dataset.adate,old_time:el.dataset.atime})
            })
            .then(function(r){return r.json();})
            .then(function(d){
              if(d.success){showToast(el.dataset.aname+' rescheduled!');_apptCache=null;renderApptsTab();}
              else{showToast('Could not save. Try again.');}
            })
            .catch(function(){showToast('Connection error.');});
          }
        });
      };
    };
  });

  // Decline
  Array.prototype.forEach.call(tb.querySelectorAll('[data-decline]'),function(el){
    el.onclick=function(){
      showConfirm({title:'Decline booking?',message:escHtml(el.dataset.aname)+' will be notified that their request for '+escHtml(el.dataset.asvc)+' was not accepted.',confirmLabel:'Decline',onConfirm:function(){
        updateApptStatus(el.dataset.decline,'declined',el.dataset.aname,el.dataset.aemail,el.dataset.asvc,el.dataset.adate,el.dataset.atime,null);
      }});
    };
  });

  // Cancel
  Array.prototype.forEach.call(tb.querySelectorAll('[data-cancel]'),function(el){
    el.onclick=function(){
      showConfirm({title:'Cancel appointment?',message:escHtml(el.dataset.aname)+'\'s '+escHtml(el.dataset.asvc)+' on '+escHtml(el.dataset.adate)+' will be cancelled and they\'ll be notified.',confirmLabel:'Cancel appointment',onConfirm:function(){
        updateApptStatus(el.dataset.cancel,'cancelled',el.dataset.aname,el.dataset.aemail,el.dataset.asvc,el.dataset.adate,el.dataset.atime,null);
      }});
    };
  });
}

  function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function updateApptStatus(id,status,name,email,service,date,time,techName){
    var body={id:id,status:status,name:name||'',email:email||'',service:service||'',date:date||'',time:time||''};
    if(techName) body.tech_name=techName;
    fetch(BOOKING_API+'/api/update-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){ if(d.success){ _apptCache=null; showToast(techName?'Assigned to '+techName+' and confirmed!':('Appointment '+status+'!')); renderDash(); } else showToast('Could not update.'); })
    .catch(function(){ showToast('Connection error.'); });
  }

  // Dashboard render is triggered by auth after login
  // document.getElementById('dashView').style.display='block';
  // ownerTab='appts';

</script>

<script>
var SESSION_KEY = 'porters_session';
var BOOKING_API_AUTH = 'https://porters-nails-api.vercel.app';

function getSession(){ return sessionStorage.getItem(SESSION_KEY); }
function setSession(t){ sessionStorage.setItem(SESSION_KEY, t); }
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }

async function showDashboard(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('managebody').style.display='flex';
  document.getElementById('dashView').style.display='block';
  ownerTab='appts';
  try{
    var token=getSession();
    var r=await fetch(BOOKING_API_AUTH+'/api/auth',{headers:{'x-session-token':token}});
    var d=await r.json();
    if(d.valid && d.role==='admin'){
      var al=document.getElementById('adminLabel');
      var ab=document.getElementById('accountsBtn');
      if(al) al.style.display='block';
      if(ab) ab.style.display='flex';
    }
  }catch(e){}
  if(typeof renderDash === 'function') renderDash();
}

async function initAuth(){
  try{
    var token=getSession();
    if(token){
      var r=await fetch(BOOKING_API_AUTH+'/api/auth',{headers:{'x-session-token':token}});
      var d=await r.json();
      if(d.valid){ showDashboard(); return; }
      clearSession();
    }
  }catch(e){}
  document.getElementById('loginScreen').style.display='flex';
}

async function doLogin(){
  var username=(document.getElementById('loginUsername').value||'').trim();
  var pwd=document.getElementById('loginPwd').value;
  var errEl=document.getElementById('loginError');
  errEl.style.display='none';
  if(!username){errEl.textContent='Please enter your username.';errEl.style.display='block';return;}
  if(!pwd){errEl.textContent='Please enter your password.';errEl.style.display='block';return;}
  try{
    var r=await fetch(BOOKING_API_AUTH+'/api/auth',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'login',username:username,password:pwd})
    });
    var d=await r.json();
    if(d.success){setSession(d.token);showDashboard();}
    else{errEl.textContent=d.error||'Incorrect username or password.';errEl.style.display='block';}
  }catch(e){errEl.textContent='Connection error. Try again.';errEl.style.display='block';}
}

async function doLogout(){
  var token=getSession();
  clearSession();
  if(token) fetch(BOOKING_API_AUTH+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json','x-session-token':token},body:JSON.stringify({action:'logout'})}).catch(function(){});
  location.reload();
}

function showChangePw(){
  var wrap=document.createElement('div');
  wrap.className='chpw-wrap';wrap.id='chpwWrap';
  wrap.innerHTML='<div class="chpw-card">'+
    '<h3>Change Password</h3>'+
    '<input class="login-field" type="password" id="chpwCurrent" placeholder="Current password" />'+
    '<input class="login-field" type="password" id="chpwNew" placeholder="New password (min 6 characters)" />'+
    '<input class="login-field" type="password" id="chpwConfirm" placeholder="Confirm new password" />'+
    '<div class="login-error" id="chpwError"></div>'+
    '<div style="display:flex;gap:.5rem;margin-top:.5rem">'+
    '<button class="btn btn-ghost" style="flex:1;padding:.65rem" onclick="document.getElementById(&quot;chpwWrap&quot;).remove()">Cancel</button>'+
    '<button class="btn btn-primary" style="flex:1;padding:.65rem;font-size:14px" onclick="doChangePw()">Update</button>'+
    '</div></div>';
  document.body.appendChild(wrap);
}

async function doChangePw(){
  var cur=document.getElementById('chpwCurrent').value;
  var nw=document.getElementById('chpwNew').value;
  var cf=document.getElementById('chpwConfirm').value;
  var err=document.getElementById('chpwError');
  err.style.display='none';
  if(!cur){err.textContent='Enter current password.';err.style.display='block';return;}
  if(nw.length<6){err.textContent='New password must be at least 6 characters.';err.style.display='block';return;}
  if(nw!==cf){err.textContent='Passwords do not match.';err.style.display='block';return;}
  var token=getSession();
  try{
    var r=await fetch(BOOKING_API_AUTH+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json','x-session-token':token},body:JSON.stringify({action:'change',password:cur,newPassword:nw})});
    var d=await r.json();
    if(d.success){showToast('Password updated! Please sign in again.');document.getElementById('chpwWrap').remove();setTimeout(doLogout,1500);}
    else{err.textContent=d.error||'Could not update password.';err.style.display='block';}
  }catch(e){err.textContent='Connection error.';err.style.display='block';}
}

function renderAccountsTab(){
  var tb=document.getElementById('tabBody');
  if(!tb) return;
  tb.innerHTML='<div class="dash-empty"><i class="ti ti-loader"></i><p>Loading accounts...</p></div>';
  var token=getSession();
  fetch(BOOKING_API_AUTH+'/api/auth',{
    method:'POST',headers:{'Content-Type':'application/json','x-session-token':token},
    body:JSON.stringify({action:'list_accounts'})
  }).then(function(r){return r.json();}).then(function(accounts){
    var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">';
    h+='<h2 style="font-family:Playfair Display,serif;font-size:22px;color:var(--rose-text)">Owner Accounts</h2>';
    h+='<button class="btn btn-primary" style="font-size:13px;padding:.5rem 1.2rem" onclick="showAddAccount()"><i class="ti ti-plus"></i> Add account</button></div>';
    h+='<div id="addAccountWrap"></div>';
    h+='<div style="display:flex;flex-direction:column;gap:.75rem">';
    accounts.forEach(function(a){
      h+='<div style="background:#fff;border:1px solid var(--rose-mid);border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between">';
      h+='<div><div style="font-weight:700;color:var(--rose-text);font-size:15px">'+a.username+'</div>';
      h+='<div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+a.role+(a.last_login?' &middot; Last login: '+new Date(a.last_login).toLocaleDateString():'')+'</div></div>';
      if(a.role!=='admin'){
        h+='<button class="mini no" onclick="deleteAccount(&quot;'+a.username+'&quot;)"><i class="ti ti-trash"></i> Remove</button>';
      }else{
        h+='<span style="font-size:12px;color:var(--text-muted)">Admin</span>';
      }
      h+='</div>';
    });
    h+='</div>';
    tb.innerHTML=h;
  }).catch(function(){tb.innerHTML='<div class="dash-empty"><p>Could not load accounts.</p></div>';});
}

function showAddAccount(){
  var wrap=document.getElementById('addAccountWrap');
  if(!wrap) return;
  wrap.innerHTML='<div style="background:var(--cream);border:1px solid var(--rose-mid);border-radius:14px;padding:1.25rem;margin-bottom:1rem">'+
    '<h4 style="margin-bottom:1rem;color:var(--rose-text)">New Account</h4>'+
    '<input class="login-field" type="text" id="newUser" placeholder="Username" style="margin-bottom:.5rem" />'+
    '<input class="login-field" type="password" id="newPwd" placeholder="Password (min 6 characters)" style="margin-bottom:.5rem" />'+
    '<div style="display:flex;gap:.5rem">'+
    '<button class="btn btn-ghost" style="flex:1;padding:.6rem;font-size:13px" onclick="document.getElementById(&quot;addAccountWrap&quot;).innerHTML=&quot;&quot;">Cancel</button>'+
    '<button class="btn btn-primary" style="flex:1;padding:.6rem;font-size:13px" onclick="createAccount()">Create</button>'+
    '</div></div>';
}

async function createAccount(){
  var username=(document.getElementById('newUser').value||'').trim();
  var password=document.getElementById('newPwd').value;
  if(!username||username.length<3){showToast('Username must be at least 3 characters.');return;}
  if(!password||password.length<6){showToast('Password must be at least 6 characters.');return;}
  var token=getSession();
  try{
    var r=await fetch(BOOKING_API_AUTH+'/api/auth',{
      method:'POST',headers:{'Content-Type':'application/json','x-session-token':token},
      body:JSON.stringify({action:'create_account',targetUsername:username,targetPassword:password,targetRole:'owner'})
    });
    var d=await r.json();
    if(d.success){showToast('Account created!');renderAccountsTab();}
    else{showToast(d.error||'Could not create account.');}
  }catch(e){showToast('Connection error.');}
}

async function deleteAccount(username){
  showConfirm({title:'Remove account?',message:'Remove access for "'+username+'"? They will no longer be able to log in.',confirmLabel:'Remove',danger:true,onConfirm:async function(){
    var token=getSession();
    try{
      var r=await fetch(BOOKING_API_AUTH+'/api/auth',{
        method:'POST',headers:{'Content-Type':'application/json','x-session-token':token},
        body:JSON.stringify({action:'delete_account',targetUsername:username})
      });
      var d=await r.json();
      if(d.success){showToast('Account removed.');renderAccountsTab();}
      else{showToast(d.error||'Could not remove.');}
    }catch(e){showToast('Connection error.');}
  }});
}

document.getElementById('loginPwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
initAuth();
</script>
</body>
</html>
